<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BM25 算法动画演示</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:#f5f7fb;color:#1f2937}.app{max-width:1280px;margin:0 auto;padding:24px}.header{background:linear-gradient(135deg,#2563eb,#0f766e);color:white;padding:24px 28px;border-radius:18px;box-shadow:0 10px 30px rgba(37,99,235,.2);margin-bottom:20px}.header h1{margin:0 0 8px;font-size:30px}.header p{margin:0;font-size:16px;opacity:.94}.layout{display:grid;grid-template-columns:360px 1fr;gap:18px}.panel{background:white;border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.08);border:1px solid #e5e7eb}.panel h2{font-size:20px;margin:0 0 14px;color:#111827}.query-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:14px}.query-title{font-size:14px;color:#1d4ed8;margin-bottom:8px;font-weight:700}.word{display:inline-block;padding:5px 10px;border-radius:999px;background:#dbeafe;color:#1e40af;font-weight:700;margin:4px;transition:all .3s ease}.word.active{background:#f97316;color:white;transform:scale(1.08)}.doc{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;background:#fafafa;transition:all .3s ease}.doc.active{border-color:#2563eb;background:#eff6ff;transform:translateX(4px)}.doc.top{border-color:#16a34a;background:#ecfdf5;box-shadow:0 0 0 3px rgba(34,197,94,.16)}.doc-title{font-weight:700;margin-bottom:8px}.tokens span{display:inline-block;margin:3px;padding:4px 8px;border-radius:8px;background:#e5e7eb;font-size:13px}.tokens span.hit{background:#fde68a;color:#92400e;font-weight:700}.stage{min-height:520px;position:relative;overflow:hidden}.step-badge{display:inline-block;background:#111827;color:white;border-radius:999px;padding:6px 12px;font-size:14px;margin-bottom:12px}.step-title{font-size:26px;font-weight:800;margin-bottom:10px;color:#111827}.step-desc{font-size:17px;line-height:1.8;color:#374151;margin-bottom:16px}.formula{background:#0f172a;color:#e5e7eb;border-radius:14px;padding:16px;font-family:Consolas,Monaco,monospace;font-size:17px;line-height:1.7;margin:14px 0;overflow-x:auto}.simple-formula{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:14px;border-radius:12px;font-size:18px;font-weight:700;margin:14px 0}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:#fff}.card h3{margin:0 0 10px;font-size:17px}table{width:100%;border-collapse:collapse;font-size:15px}th,td{border-bottom:1px solid #e5e7eb;padding:9px 8px;text-align:left}th{background:#f9fafb;color:#374151}.score-row{transition:all .35s ease}.score-row.highlight{background:#ecfdf5;font-weight:700}.bar-wrap{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden;width:100%}.bar{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#2563eb);border-radius:99px;transition:width .8s ease}.controls{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}button{border:none;padding:11px 16px;border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s ease;font-size:15px}button:hover{transform:translateY(-1px)}.btn-primary{background:#2563eb;color:white}.btn-secondary{background:#e5e7eb;color:#111827}.btn-green{background:#16a34a;color:white}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:18px}.progress-inner{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#16a34a);transition:width .3s ease}.tip{background:#fefce8;border:1px solid #fde68a;color:#854d0e;border-radius:12px;padding:12px 14px;margin-top:14px;line-height:1.7}.calc-line{padding:8px 0;border-bottom:1px dashed #e5e7eb;font-family:Consolas,Monaco,monospace;font-size:15px}.big-result{font-size:26px;font-weight:900;color:#16a34a;margin-top:10px}.pill{display:inline-block;padding:4px 9px;background:#eef2ff;color:#3730a3;border-radius:999px;font-weight:700;margin:2px}@media(max-width:980px){.layout{grid-template-columns:1fr}.stage{min-height:auto}}
</style>
</head>
<body>
<div class="app">
<div class="header"><h1>BM25 算法网页动画演示</h1><p>一步一步演示：查询分词 → IDF 计算 → 文档命中 → 长度修正 → 最终排序</p></div>
<div class="layout">
<div class="panel"><h2>语料与查询</h2><div class="query-box"><div class="query-title">用户查询 Q</div><div id="queryWords"></div></div><div id="docs"></div><div class="tip"><b>核心记忆：</b><br>BM25 = 关键词匹配 + 稀有词加权 + 文档长度修正</div></div>
<div class="panel"><div class="progress"><div class="progress-inner" id="progressInner"></div></div><div class="stage" id="stage"></div><div class="controls"><button class="btn-secondary" onclick="prevStep()">上一步</button><button class="btn-primary" onclick="nextStep()">下一步</button><button class="btn-green" onclick="autoPlay()">自动播放/暂停</button><button class="btn-secondary" onclick="resetDemo()">重置</button></div></div>
</div>
</div>
<script>
const query=["Redis","缓存","过期时间"];
const docs=[{id:"D1",text:"Redis 设置 缓存 过期时间",tokens:["Redis","设置","缓存","过期时间"],score:2.8093},{id:"D2",text:"Redis 内存 数据库",tokens:["Redis","内存","数据库"],score:.7179},{id:"D3",text:"Python 安装 第三方库",tokens:["Python","安装","第三方库"],score:0},{id:"D4",text:"MySQL 创建 数据库",tokens:["MySQL","创建","数据库"],score:0}];
let currentStep=0,timer=null;
function initLeftPanel(){document.getElementById("queryWords").innerHTML=query.map(w=>`<span class="word">${w}</span>`).join("");document.getElementById("docs").innerHTML=docs.map(doc=>{const tokens=doc.tokens.map(t=>`<span>${t}</span>`).join("");return `<div class="doc" id="${doc.id}"><div class="doc-title">${doc.id}：${doc.text}</div><div class="tokens">${tokens}</div></div>`}).join("")}
function clearHighlights(){document.querySelectorAll(".word").forEach(el=>el.classList.remove("active"));document.querySelectorAll(".doc").forEach(el=>el.classList.remove("active","top"));document.querySelectorAll(".tokens span").forEach(el=>el.classList.remove("hit"))}
function highlightQueryWords(){document.querySelectorAll(".word").forEach(el=>el.classList.add("active"))}
function highlightHits(docIds=[]){docIds.forEach(id=>{const docEl=document.getElementById(id);if(!docEl)return;docEl.classList.add("active");docEl.querySelectorAll(".tokens span").forEach(span=>{if(query.includes(span.textContent))span.classList.add("hit")})})}
function renderStep(){clearHighlights();document.getElementById("stage").innerHTML=steps[currentStep]();document.getElementById("progressInner").style.width=`${currentStep/(steps.length-1)*100}%`;if(currentStep>=1)highlightQueryWords();if(currentStep===3)highlightHits(["D1","D2"]);if(currentStep===4)highlightHits(["D1"]);if(currentStep===5)highlightHits(["D2"]);if(currentStep===6){highlightHits(["D1","D2"]);document.getElementById("D1").classList.add("top");setTimeout(()=>document.querySelectorAll(".bar").forEach(bar=>bar.style.width=bar.dataset.width),100)}}
const steps=[
()=>`<span class="step-badge">第 1 步</span><div class="step-title">认识 BM25 的目标</div><div class="step-desc">BM25 的任务是：给每篇文档计算一个相关性分数。<br>分数越高，说明这篇文档和用户查询越相关。</div><div class="simple-formula">BM25 = 关键词匹配 + 稀有词加权 + 文档长度修正</div><div class="card"><h3>本次查询</h3><p><span class="pill">Redis</span><span class="pill">缓存</span><span class="pill">过期时间</span></p></div><div class="tip">接下来会一步一步计算每篇文档的 BM25 得分。</div>`,
()=>`<span class="step-badge">第 2 步</span><div class="step-title">查询分词</div><div class="step-desc">BM25 是基于词计算的，所以先把用户查询拆成一个个查询词。</div><div class="formula">Q = Redis 缓存 过期时间<br>q1 = Redis<br>q2 = 缓存<br>q3 = 过期时间</div><div class="tip">后面会分别计算 Redis、缓存、过期时间 在每篇文档中的得分。</div>`,
()=>`<span class="step-badge">第 3 步</span><div class="step-title">计算 IDF：词越少见越重要</div><div class="step-desc">IDF 表示词的重要程度。一个词出现在越少的文档里，它越能区分文档主题。</div><div class="formula">IDF(qi) = ln(1 + (N - df(qi) + 0.5) / (df(qi) + 0.5))</div><table><thead><tr><th>查询词</th><th>出现文档</th><th>df</th><th>IDF</th></tr></thead><tbody><tr><td>Redis</td><td>D1、D2</td><td>2</td><td>0.6931</td></tr><tr><td>缓存</td><td>D1</td><td>1</td><td>1.2040</td></tr><tr><td>过期时间</td><td>D1</td><td>1</td><td>1.2040</td></tr></tbody></table><div class="tip">缓存、过期时间比 Redis 更重要，因为它们出现得更少。</div>`,
()=>`<span class="step-badge">第 4 步</span><div class="step-title">观察每篇文档命中了哪些词</div><div class="step-desc">BM25 会先判断查询词是否出现在文档中。没有命中的词，得分为 0。</div><table><thead><tr><th>文档</th><th>命中词</th></tr></thead><tbody><tr><td>D1</td><td>Redis、缓存、过期时间</td></tr><tr><td>D2</td><td>Redis</td></tr><tr><td>D3</td><td>无</td></tr><tr><td>D4</td><td>无</td></tr></tbody></table><div class="simple-formula">文档得分 = Redis得分 + 缓存得分 + 过期时间得分</div>`,
()=>`<span class="step-badge">第 5 步</span><div class="step-title">计算 D1 的 BM25 得分</div><div class="step-desc">D1 命中 3 个查询词，并且每个词都出现 1 次。</div><div class="formula">修正值 = [f × (k1 + 1)] / [f + k1 × (1 - b + b × |D| / avgdl)]<br>k1 = 1.5，b = 0.75，|D1| = 4，avgdl = 3.25，f = 1<br><br>修正值 = 2.5 / [1 + 1.5 × (0.25 + 0.75 × 4 / 3.25)]<br>修正值 ≈ 0.9059</div><div class="card"><div class="calc-line">Redis得分 = 0.6931 × 0.9059 = 0.6279</div><div class="calc-line">缓存得分 = 1.2040 × 0.9059 = 1.0907</div><div class="calc-line">过期时间得分 = 1.2040 × 0.9059 = 1.0907</div><div class="big-result">D1 总分 = 2.8093</div></div>`,
()=>`<span class="step-badge">第 6 步</span><div class="step-title">计算 D2 的 BM25 得分</div><div class="step-desc">D2 只命中 Redis，没有命中缓存、过期时间。</div><div class="formula">k1 = 1.5，b = 0.75，|D2| = 3，avgdl = 3.25，f = 1<br><br>修正值 = 2.5 / [1 + 1.5 × (0.25 + 0.75 × 3 / 3.25)]<br>修正值 ≈ 1.0358</div><div class="card"><div class="calc-line">Redis得分 = 0.6931 × 1.0358 = 0.7179</div><div class="calc-line">缓存得分 = 0</div><div class="calc-line">过期时间得分 = 0</div><div class="big-result">D2 总分 = 0.7179</div></div><div class="tip">D2 虽然比 D1 短，但是只命中了 Redis，所以总分远低于 D1。</div>`,
()=>{const maxScore=Math.max(...docs.map(d=>d.score));return `<span class="step-badge">第 7 步</span><div class="step-title">最终排序结果</div><div class="step-desc">BM25 会按照得分从高到低排序，得分最高的文档就是最相关结果。</div><table><thead><tr><th>排名</th><th>文档</th><th>BM25 得分</th><th>可视化</th></tr></thead><tbody>${docs.slice().sort((a,b)=>b.score-a.score).map((doc,index)=>{const width=maxScore===0?0:(doc.score/maxScore*100).toFixed(1);return `<tr class="score-row ${index===0?'highlight':''}"><td>第 ${index+1} 名</td><td>${doc.id}：${doc.text}</td><td>${doc.score.toFixed(4)}</td><td><div class="bar-wrap"><div class="bar" data-width="${width}%"></div></div></td></tr>`}).join("")}</tbody></table><div class="simple-formula">最终结果：D1 最相关，因为它同时命中了 Redis、缓存、过期时间。</div>`},
()=>`<span class="step-badge">第 8 步</span><div class="step-title">快速记忆版</div><div class="step-desc">BM25 的真实公式可以先不用死记，先记住下面这个理解模型。</div><div class="simple-formula">BM25 = 关键词匹配 + 稀有词加权 + 文档长度修正</div><div class="grid-2"><div class="card"><h3>真实公式</h3><div class="formula">score(D,Q) = Σ IDF × 词频修正 × 长度修正</div></div><div class="card"><h3>快速技巧公式</h3><div class="formula">BM25快速分 ≈ 命中词IDF之和 × avgdl / 当前文档长度</div></div></div><div class="tip">工程中使用 rank-bm25、Elasticsearch、OpenSearch 即可；手算可以用快速技巧公式理解排序。</div>`
];
function nextStep(){if(currentStep<steps.length-1){currentStep++;renderStep()}}
function prevStep(){if(currentStep>0){currentStep--;renderStep()}}
function resetDemo(){currentStep=0;if(timer){clearInterval(timer);timer=null}renderStep()}
function autoPlay(){if(timer){clearInterval(timer);timer=null;return}timer=setInterval(()=>{if(currentStep>=steps.length-1){clearInterval(timer);timer=null}else nextStep()},1800)}
initLeftPanel();renderStep();
</script>
</body>
</html>
