const lines = ["# 导入标准库", "import json", "import os", "# 导入 PyTorch", "import torch", "# 导入日志", "import sys", "from base.logger import logger", "# 导入numpy", "import numpy as np", "# 导入 Transformers 库", "from transformers import BertTokenizer, BertForSequenceClassification", "from transformers import Trainer, TrainingArguments", "# 导入train_test_split", "from sklearn.model_selection import train_test_split", "from sklearn.metrics import classification_report, confusion_matrix", "", "current_dir = os.path.dirname(os.path.abspath(__file__))", "rag_qa_path = os.path.abspath(os.path.dirname(os.path.abspath(current_dir)))", "project_root = os.path.abspath(os.path.dirname(os.path.abspath(rag_qa_path)))", "sys.path.insert(0, project_root)", "", "class QueryClassifier:", "    def __init__(self, model_path='models/bert_query_classifier'):", "        self.pre_trained_model_path = f'{rag_qa_path}/models/bert-base-chinese'", "        self.model_path = model_path", "        self.tokenizer = BertTokenizer.from_pretrained(self.pre_trained_model_path)", "        self.model = None", "        self.device = torch.device(\"cuda\" if torch.cuda.is_available() else \"mps\" if torch.mps.is_available() else \"cpu\")", "        logger.info(f\"使用设备: {self.device}\")", "        self.label_map = {\"通用知识\": 0, \"专业咨询\": 1}", "        self.load_model()", "", "    def load_model(self):", "        if os.path.exists(self.model_path):", "            self.model = BertForSequenceClassification.from_pretrained(self.model_path)", "            self.model.to(self.device)", "            logger.info(f\"加载模型: {self.model_path}\")", "        else:", "            self.model = BertForSequenceClassification.from_pretrained(", "                self.pre_trained_model_path,", "                num_labels=2", "            )", "            self.model.to(self.device)", "            logger.info(\"初始化新 BERT 模型\")", "", "    def save_model(self):", "        self.model.save_pretrained(self.model_path)", "        self.tokeniz const codeWrap = document.getElementById("codeWrap");
const badge = document.getElementById("badge");
const bar = document.getElementById("bar");
const count = document.getElementById("count");
const typeEl = document.getElementById("type");
const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const ioEl = document.getElementById("io");
const logEl = document.getElementById("log");

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const playBtn = document.getElementById("play");
const resetBtn = document.getElementById("reset");
const speedSel = document.getElementById("speed");

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

lines.forEach((line, idx) => {
  const row = document.createElement("div");
  row.className = "line" + (line.trim().startsWith("#") ? " comment" : "");
  row.dataset.index = idx;
  row.innerHTML = `<span class="num">${idx + 1}</span><span class="txt">${escapeHtml(line) || " "}</span>`;
  codeWrap.appendChild(row);
});

let current = -1;
let timer = null;

function updateStage(stageName) {
  document.querySelectorAll(".node").forEach(node => {
    node.classList.toggle("active", node.dataset.stage === stageName);
  });
}

function render(index) {
  if (index < 0) index = 0;
  if (index >= lines.length) index = lines.length - 1;
  current = index;

  document.querySelectorAll(".line").forEach((row, i) => {
    row.classList.toggle("active", i === current);
  });

  const activeRow = document.querySelector(`.line[data-index="${current}"]`);
  if (activeRow) {
    const containerRect = codeWrap.getBoundingClientRect();
    const rowRect = activeRow.getBoundingClientRect();
    const delta =
      rowRect.top
      - containerRect.top
      - (codeWrap.clientHeight / 2)
      + (activeRow.clientHeight / 2);

    codeWrap.scrollTo({
      top: Math.max(0, codeWrap.scrollTop + delta),
      behavior: "smooth"
    });
  }

  const e = explainData[current];

  badge.textContent = `第 ${current + 1} 行`;
  bar.style.width = `${((current + 1) / lines.length) * 100}%`;
  count.textContent = `${current + 1}/${lines.length}`;

  typeEl.textContent = e.type;
  titleEl.textContent = e.title;
  descEl.textContent = e.desc;
  ioEl.textContent = "输入 / 输出：" + e.io;

  updateStage(e.stage);

  // 日志不再增量追加，而是严格按照当前索引重新生成。
  // 这样左侧当前行、顶部行号和日志最后一条始终完全一致。
  const logFragment = document.createDocumentFragment();

  for (let i = 0; i <= current; i++) {
    const itemExplain = explainData[i];
    const logItem = document.createElement("div");

    logItem.dataset.line = String(i + 1);
    logItem.textContent =
      `[第${i + 1}行] ${itemExplain.title} —— ${itemExplain.desc}`;

    if (i === current) {
      logItem.classList.add("current-log-line");
    }

    logFragment.appendChild(logItem);
  }

  logEl.replaceChildren(logFragment);

  // 等待浏览器完成日志布局后，再滚动到真正的最后一条。
  requestAnimationFrame(() => {
    const currentLogLine = logEl.querySelector(".current-log-line");

    if (currentLogLine) {
      currentLogLine.scrollIntoView({
        block: "end",
        inline: "nearest"
      });
    }

    logEl.scrollTop = logEl.scrollHeight;
  });

  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === lines.length - 1;
}

function nextStep() {
  if (current < lines.length - 1) {
    render(current + 1);
  } else {
    stopPlay();
  }
}

function prevStep() {
  if (current > 0) {
    render(current - 1);
  }
}

function startPlay() {
  if (timer) {
    stopPlay();
    return;
  }
  if (current === lines.length - 1) {
    resetAll();
  }
  if (current < 0) {
    render(0);
  }
  playBtn.textContent = "暂停播放";
  timer = setInterval(() => {
    if (current >= lines.length - 1) {
      stopPlay();
      return;
    }
    render(current + 1);
  }, Number(speedSel.value));
}

function stopPlay() {
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
  playBtn.textContent = "自动播放";
}

function resetAll() {
  stopPlay();
  current = -1;
  document.querySelectorAll(".line").forEach(row => row.classList.remove("active"));
  document.querySelectorAll(".node").forEach(node => node.classList.remove("active"));
  badge.textContent = "等待开始";
  bar.style.width = "0%";
  count.textContent = `0/${lines.length}`;
  typeEl.textContent = "准备";
  titleEl.textContent = "点击“自动播放”或“下一行”";
  descEl.textContent = "动画会从第一行开始，逐行解释代码，并持续往下播放，不会卡在中间。";
  ioEl.textContent = "输入 / 输出：等待执行";
  logEl.innerHTML = "";
  prevBtn.disabled = true;
  nextBtn.disabled = false;
  codeWrap.scrollTop = 0;
}

prevBtn.addEventListener("click", prevStep);
nextBtn.addEventListener("click", nextStep);
playBtn.addEventListener("click", startPlay);
resetBtn.addEventListener("click", resetAll);
speedSel.addEventListener("change", () => {
  if (timer) {
    stopPlay();
    startPlay();
  }
});

window.scrollTo(0, 0);









resetAll();
</script>
