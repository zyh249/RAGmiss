function escapeHtml(s){return s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");}
function syntax(line){ const raw=escapeHtml(line); const trimmed=raw.trim(); if(trimmed.startsWith("#")) return `<span class="comment">${raw}</span>`; let placeholders=[]; let s=raw.replace(/("[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*')/g,m=>{const key=`@@S${placeholders.length}@@`; placeholders.push(`<span class="str">${m}</span>`); return key;}); const ci=s.indexOf("#"); let comment=""; if(ci>=0){comment=s.slice(ci); s=s.slice(0,ci);} s=s.replace(/\b(def|return|if|else|for|in|from|import|class|try|except|as|None|True|False)\b/g,`<span class="kw">$1</span>`); s=s.replace(/\b(BGEM3EmbeddingFunction|MilvusClient|DataType|AnnSearchRequest|WeightedRanker|Document|CrossEncoder|Config)\b/g,`<span class="cls">$1</span>`); s=s.replace(/\b([A-Za-z_]\w*)(?=\()/g,`<span class="fn">$1</span>`); s=s.replace(/\b\d+(?:\.\d+)?\b/g,`<span class="num">$&</span>`); placeholders.forEach((v,i)=>{s=s.replace(`@@S${i}@@`,v)}); if(comment) s+=`<span class="comment">${comment}</span>`; return s; }
function renderCode(){ const table=document.getElementById("codeTable"); const activeLines=current>=0?new Set(STEPS[current].lines):new Set(); table.innerHTML=CODE_LINES.map((line,idx)=>{const ln=idx+1; const cls=activeLines.has(ln)?"active-line":""; return `<tr id="line-${ln}" class="${cls}"><td class="ln">${ln}</td><td class="src">${syntax(line)}</td></tr>`;}).join("");}
function renderFlow(){ const activeNode=current>=0?STEPS[current].node:""; const grid=document.getElementById("flowGrid"); grid.innerHTML=FLOW_NODES.map(([name,sub])=>{const done=completed.has(name)?"done":""; const active=activeNode===name?"active":""; return `<div class="flow-node ${done} ${active}" onclick="jumpToNode('${name}')"><div class="name">${name}</div><div class="sub">${sub}</div></div>`;}).join("");}
function applyStepEffects(step){ switch(step.id){ case "entry": state.query="人工智能主要学什么？"; break; case "embed": state.query_embeddings={dense:"[[0.031, -0.128, 0.407, ...]]",sparse:"<1x250002 sparse row, nnz=3>"}; break; case "dense": state.dense_query_vector="[0.031, -0.128, 0.407, 0.022, ...]"; break; case "sparse_init": state.sparse_query_vector={}; break; case "sparse_row": state.row="<sparse row 0>"; state.indices=[1012,8841,23018]; state.values=[0.82,0.57,0.31]; break; case "sparse_fill": state.sparse_query_vector={"1012":0.82,"8841":0.57,"23018":0.31}; break; case "filter": state.filter_expr=state.source_filter?`source == '${state.source_filter}'`:""; break; case "dense_req": state.dense_request={anns_field:"dense_vector",metric_type:"IP",nprobe:10,limit:state.k,expr:state.filter_expr}; break; case "sparse_req": state.sparse_request={anns_field:"sparse_vector",metric_type:"IP",limit:state.k,expr:state.filter_expr}; break; case "ranker": state.ranker="WeightedRanker(0.7, 1.0)"; break; case "hybrid": state.results=state.scenario==="skip"?[{score:0.91,entity:{text:"AI课程子块A",parent_id:"p1",source:"ai"}},{score:0.86,entity:{text:"AI课程子块B",parent_id:"p1",source:"ai"}}]:[{score:0.91,entity:{text:"AI课程子块A",parent_id:"p1",source:"ai"}},{score:0.83,entity:{text:"机器学习子块B",parent_id:"p1",source:"ai"}},{score:0.78,entity:{text:"深度学习子块C",parent_id:"p2",source:"ai"}}]; break; case "hit_doc": state.sub_chunks=state.results.map(x=>({page_content:x.entity.text,metadata:{parent_id:x.entity.parent_id,source:x.entity.source}})); break; case "parent_merge": state.parent_docs=state.scenario==="skip"?[{page_content:"人工智能课程完整父块...",metadata:{parent_id:"p1",source:"ai"}}]:[{page_content:"人工智能课程完整父块...",metadata:{parent_id:"p1",source:"ai"}},{page_content:"深度学习课程完整父块...",metadata:{parent_id:"p2",source:"ai"}}]; break; case "if_skip": if(state.parent_docs&&state.parent_docs.length<2){state.returnValue=state.parent_docs.slice(0,2)} break; case "pairs": state.pairs=state.parent_docs.map(doc=>[state.query,doc.page_content]); break; case "scores": state.scores=[0.92,0.67]; break; case "sort": state.ranked_parent_docs=[state.parent_docs[0],state.parent_docs[1]]; break; case "return_final": state.returnValue=state.ranked_parent_docs?state.ranked_parent_docs.slice(0,1):state.returnValue; break; } }
function nextIndex(){ if(current<0) return 0; const id=STEPS[current].id; if(id==="if_skip"&&state.parent_docs&&state.parent_docs.length<2){return STEPS.findIndex(s=>s.id==="return_final")} return current+1; }
function renderDetail(){ const step=current>=0?STEPS[current]:null; if(!step){document.getElementById("detailTitle").innerText="等待开始";document.getElementById("detailExplain").innerText="点击“自动演示”或“手工下一步”。";["dataFormat","sampleData","effectData"].forEach(id=>document.getElementById(id).innerText="-");document.getElementById("localsData").innerText=JSON.stringify(state,null,2);document.getElementById("moduleBadge").innerText="模块：-";return;} document.getElementById("detailTitle").innerText=step.title; document.getElementById("detailExplain").innerText=step.explain; document.getElementById("dataFormat").innerText=step.format; document.getElementById("sampleData").innerText=step.sample; document.getElementById("effectData").innerText=step.effect; document.getElementById("moduleBadge").innerText=`模块：${step.node}`; const brief={query:state.query,source_filter:state.source_filter,filter_expr:state.filter_expr,dense_query_vector:state.dense_query_vector?"shape=(1024,)":null,sparse_query_vector:state.sparse_query_vector,dense_request:state.dense_request,sparse_request:state.sparse_request,ranker:state.ranker,sub_chunks_len:state.sub_chunks?state.sub_chunks.length:null,parent_docs_len:state.parent_docs?state.parent_docs.length:null,scores:state.scores,returnValue:state.returnValue}; document.getElementById("localsData").innerText=JSON.stringify(brief,null,2); document.getElementById("stQuery").innerText=state.query||"-"; document.getElementById("stFilter").innerText=state.filter_expr===""?'""':(state.filter_expr||"-"); document.getElementById("stSub").innerText=state.sub_chunks?state.sub_chunks.length:"-"; document.getElementById("stParent").innerText=state.parent_docs?state.parent_docs.length:"-"; }
function renderAll(){ renderCode(); renderFlow(); renderDetail(); const n=STEPS.length; const pos=current<0?0:current+1; document.getElementById("stepBadge").innerText=current<0?"等待开始":`第 ${pos}/${n} 步`; document.getElementById("progressBar").style.width=`${(pos/n)*100}%`; if(current>=0){const firstLine=STEPS[current].lines[0]; const el=document.getElementById(`line-${firstLine}`); if(el) el.scrollIntoView({block:"center",inline:"nearest",behavior:"smooth"});}}
function nextStep(){ const ni=nextIndex(); if(ni>=STEPS.length) return; history.push({current,completed:[...completed],state:deepClone(state)}); current=ni; const step=STEPS[current]; applyStepEffects(step); completed.add(step.node); renderAll(); }
function prevStep(){ const snap=history.pop(); if(!snap) return; current=snap.current; completed=new Set(snap.completed); state=snap.state; renderAll(); }
function resetEngine(){ if(autoTimer){clearInterval(autoTimer);autoTimer=null;} current=-1; completed=new Set(); history=[]; state=initialState(); document.getElementById("autoBtn").innerText="自动演示"; renderAll();}
function autoRun(){ if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById("autoBtn").innerText="自动演示";return;} document.getElementById("autoBtn").innerText="暂停"; autoTimer=setInterval(()=>{const before=current; nextStep(); if(current===before||current>=STEPS.length-1){clearInterval(autoTimer);autoTimer=null;document.getElementById("autoBtn").innerText="自动演示";}},950);}
function jumpToNode(nodeName){ const idx=STEPS.findIndex(s=>s.node===nodeName); if(idx<0) return; resetEngine(); while(current<idx){nextStep(); if(current>=STEPS.length-1) break;}}
resetEngine();
</script>
